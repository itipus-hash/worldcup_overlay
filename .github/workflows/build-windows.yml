name: Build Windows EXE

on:
  workflow_dispatch:    # manual trigger from the Actions tab
  push:
    branches: [main]
    tags:    [v*]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12 (Windows build env)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install PyInstaller + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.10.0
          pip install PyQt5==5.15.11 requests==2.32.3 pillow

      - name: Build the Windows bundle
        # We invoke the .spec directly. PyInstaller needs the icon in
        # .ico format on Windows, so we generate it from gear.png with
        # Pillow before invoking PyInstaller.
        run: |
          python -c "from PIL import Image; im=Image.open('gear.png'); im.save('gear.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          # Patch the spec to point at gear.ico (if the spec still says gear.png / .icns)
          python -c "
          import re, os
          spec = open('WorldCupOverlay.spec').read()
          if os.path.exists('gear.ico'):
              spec = re.sub(r\"icon='[^']*'\", \"icon='gear.ico'\", spec)
              open('WorldCupOverlay.spec','w').write(spec)
              print('spec updated to use gear.ico')
          else:
              print('gear.ico not present, using default icon')
          "
          pyinstaller --noconfirm --clean WorldCupOverlay.spec

      - name: Rename exe for clarity
        shell: pwsh
        run: |
          Set-Location dist
          if (Test-Path WorldCupOverlay) {
            Rename-Item WorldCupOverlay WorldCupOverlay_win64
          }
          Get-ChildItem WorldCupOverlay_win64

      - name: Zip the build
        shell: pwsh
        run: |
          Set-Location dist
          if (Test-Path WorldCupOverlay_win64) {
            Compress-Archive -Path WorldCupOverlay_win64,../README.md -DestinationPath WorldCupOverlay_win64.zip
          } else {
            Write-Error "dist/WorldCupOverlay_win64 not found"
            exit 1
          }
          Get-Item WorldCupOverlay_win64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldCupOverlay-win64
          path: dist/WorldCupOverlay_win64.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: WorldCupOverlay-win64
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WorldCupOverlay_win64.zip
          generate_release_notes: true
