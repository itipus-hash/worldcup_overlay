name: Build Windows EXE

on:
  workflow_dispatch:    # manual trigger from the Actions tab
  push:
    branches: [main]
    tags:    [v*]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: worldcup_overlay

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12 (Windows build env)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: worldcup_overlay/requirements.txt

      - name: Install PyInstaller + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.10.0
          pip install PyQt5==5.15.11 requests==2.32.3

      - name: Build the Windows bundle
        # We invoke the .spec directly. PyInstaller needs the icon in
        # .ico format on Windows, so we generate it from gear.png with
        # ImageMagick if available, otherwise fall back to the default
        # PyInstaller icon.
        run: |
          # Try to convert PNG to ICO with Pillow (lightweight, often
          # preinstalled on the runner via setup-python image).
          python -c "from PIL import Image; im=Image.open('gear.png'); im.save('gear.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])" \
            && icon_line="icon='gear.ico'" \
            || icon_line="# icon='gear.png'  # Pillow missing; use default"
          # Patch the spec to point at gear.ico if we have one.
          python -c "
          import re, sys, os
          spec = open('WorldCupOverlay.spec').read()
          if os.path.exists('gear.ico'):
              spec = re.sub(r\"icon='[^']*'\", \"icon='gear.ico'\", spec)
              open('WorldCupOverlay.spec','w').write(spec)
              print('spec updated to use gear.ico')
          else:
              print('gear.ico not present, using default icon')
          "
          pyinstaller --noconfirm --clean WorldCupOverlay.spec

      - name: Rename exe for clarity
        run: |
          # The .spec outputs a single-file exe inside dist/WorldCupOverlay/.
          # Wrap it in a versioned folder for the artifact.
          cd dist
          mv WorldCupOverlay WorldCupOverlay_win64
          ls -la WorldCupOverlay_win64

      - name: Zip the build
        run: |
          cd dist
          7z a WorldCupOverlay_win64.zip WorldCupOverlay_win64 README.md 2>/dev/null \
            || powershell Compress-Archive -Path WorldCupOverlay_win64,README.md -DestinationPath WorldCupOverlay_win64.zip
          ls -la WorldCupOverlay_win64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldCupOverlay-win64
          path: worldcup_overlay/dist/WorldCupOverlay_win64.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: WorldCupOverlay-win64
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WorldCupOverlay_win64.zip
          generate_release_notes: true
